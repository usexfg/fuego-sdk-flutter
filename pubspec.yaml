name: fuego_defi_sdk_flutter_workspace
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"

workspace:
  - packages/fuego_wallet_build_transformer
  - packages/fuego_ui
  - packages/fuego_symbol_converter
  - packages/fuego_defi_types
  - packages/fuego_defi_sdk
  - packages/fuego_defi_sdk/example
  - packages/fuego_defi_rpc_methods
  - packages/fuego_defi_local_auth
  - packages/fuego_defi_framework
  - packages/fuego_coins
  - packages/fuego_coin_updates
  - packages/fuego_cex_market_data
  - packages/dragon_logs
  - packages/dragon_logs/example
  - packages/dragon_charts_flutter
  - packages/dragon_charts_flutter/example
  - packages/fuego_wallet_cli
  - packages/fuego_legacy_wallet_migration

  # TODO: Change products and playground to reference pub.dev hosted packages and remove from here.
  - products/dex_dungeon
  - products/komodo_compliance_console
  - playground

dev_dependencies:
  melos: ^7.0.0

melos:
  ide:
    intellij:
      enabled: true
  command:
    bootstrap:
      hooks:
        post: melos run prepare
  scripts:
    prepare:
      run: melos run indexes:generate --no-select && melos run runners:generate --no-select
    indexes:generate:
      run: dart run index_generator
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: index_generator
    runners:generate:
      run: dart run build_runner build --delete-conflicting-outputs
      exec:
        concurrency: 1
      packageFilters:
        dependsOn:
          - build_runner
    upgrade:major:
      run: flutter pub upgrade --major-versions
      exec:
        concurrency: 1
    assets:generate:
      run: flutter build bundle
      exec:
        concurrency: 1
      packageFilters:
        dependsOn:
          - flutter
  categories:
    examples:
      - packages/example*
